---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: mlops-energy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: admin
          ports:
            - containerPort: 3000
          volumeMounts:
            - name: data
              mountPath: /var/lib/grafana
            - name: ds
              mountPath: /etc/grafana/provisioning/datasources/datasource.yml
              subPath: datasource.yml
            - name: providers
              mountPath: /etc/grafana/provisioning/dashboards/dashboards.yml
              subPath: dashboards.yml
            - name: dashboard
              mountPath: /var/lib/grafana/dashboards/slurm-energy-overview.json
              subPath: slurm-energy-overview.json
      volumes:
        - name: data
          emptyDir: {}
        - name: ds
          configMap:
            name: grafana-datasource
        - name: providers
          configMap:
            name: grafana-dashboards-provider
        - name: dashboard
          configMap:
            name: grafana-dashboard-slurm-energy
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: mlops-energy
spec:
  selector:
    app: grafana
  ports:
    - name: http
      port: 3000
      targetPort: 3000
