    global:
      scrape_interval: 5s

    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets: ['localhost:9090']

      - job_name: slurmd-node-exporter
        static_configs:
          - targets: ['slurmd-node-exporter:9100']
