apiVersion: v1
kind: Secret
metadata:
  name: slurm-munge-key
  namespace: mlops-energy
type: Opaque
stringData:
  munge.key: "Jx2GQw5dP1r8uK4nL9sV7aE3mT0yH6cB"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: slurm-config
  namespace: mlops-energy
data:
  entrypoint.sh: |
    #!/bin/bash
    set -euo pipefail

    ROLE="${1:-controller}"

    mkdir -p /run/munge /var/log/munge /var/log/slurm /var/spool/slurmctld /var/spool/slurmd /workspace/logs /workspace/energy_metrics/node_exporter
    touch /var/log/munge/munged.log
    chown -R munge:munge /run/munge
    chown -R root:root /var/log/munge
    chmod 0700 /run/munge
    chmod 0755 /var/log/munge
    chmod 0600 /var/log/munge/munged.log

    /usr/sbin/munged --force --log-file=/var/log/munge/munged.log

    if [ "${ROLE}" = "controller" ]; then
      echo "Starting slurmctld..."
      exec /usr/sbin/slurmctld -D -vvv
    fi

    if [ ! -e /dev/nvidia2 ]; then
      GPU_DEV="$(ls /dev/nvidia[0-9]* 2>/dev/null | head -n 1 || true)"
      if [ -n "${GPU_DEV}" ]; then
        ln -sf "${GPU_DEV}" /dev/nvidia2
      fi
    fi

    echo "Starting slurmd..."
    exec /usr/sbin/slurmd -D -vvv
  slurm.conf: |
    ClusterName=rancher-docker-like
    SlurmctldHost=slurmctld

    MpiDefault=none
    ProctrackType=proctrack/linuxproc
    ReturnToService=2
    SlurmctldPidFile=/var/run/slurmctld.pid
    SlurmdPidFile=/var/run/slurmd.pid
    SlurmdSpoolDir=/var/spool/slurmd
    SlurmUser=root
    StateSaveLocation=/var/spool/slurmctld
    SwitchType=switch/none
    TaskPlugin=task/none
    AuthType=auth/munge
    CredType=cred/munge
    MailProg=/bin/true

    SchedulerType=sched/backfill
    SelectType=select/cons_tres
    SelectTypeParameters=CR_Core
    GresTypes=gpu

    SlurmctldPort=6817
    SlurmdPort=6818

    NodeName=slurmd CPUs=256 Boards=1 SocketsPerBoard=2 CoresPerSocket=64 ThreadsPerCore=2 RealMemory=500000 Gres=gpu:1 State=UNKNOWN
    PartitionName=debug Nodes=slurmd Default=YES MaxTime=INFINITE State=UP
  gres.conf: |
    NodeName=slurmd Name=gpu File=/dev/nvidia2
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  namespace: mlops-energy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: mlflow
          image: ghcr.io/its-ghaith/slurm-scheduler-ml/mlops-slurm-runtime:latest
          imagePullPolicy: Always
          env:
            - name: MLFLOW_SERVER_ALLOWED_HOSTS
              value: "*"
            - name: MLFLOW_SERVER_CORS_ALLOWED_ORIGINS
              value: "*"
          command: ["/bin/bash", "-lc"]
          args:
            - |
              mkdir -p /mlflow /mlruns && \
              mlflow server \
                --host 0.0.0.0 \
                --port 5000 \
                --backend-store-uri sqlite:////mlflow/mlflow.db \
                --default-artifact-root /mlruns
          ports:
            - containerPort: 5000
          readinessProbe:
            tcpSocket:
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 5
          startupProbe:
            tcpSocket:
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 60
          volumeMounts:
            - name: mlflow-data
              mountPath: /mlflow
            - name: mlruns
              mountPath: /mlruns
      volumes:
        - name: mlflow-data
          emptyDir: {}
        - name: mlruns
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: mlflow
  namespace: mlops-energy
spec:
  selector:
    app: mlflow
  ports:
    - name: http
      port: 5000
      targetPort: 5000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: slurmctld
  namespace: mlops-energy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: slurmctld
  template:
    metadata:
      labels:
        app: slurmctld
    spec:
      hostname: slurmctld
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: slurmctld
          image: ghcr.io/its-ghaith/slurm-scheduler-ml/mlops-slurm-runtime:latest
          imagePullPolicy: Always
          command: ["/bin/bash", "-lc"]
          args:
            - /bin/bash /opt/slurm/entrypoint.sh controller
          ports:
            - containerPort: 6817
          volumeMounts:
            - name: slurm-config
              mountPath: /opt/slurm
            - name: slurm-conf
              mountPath: /etc/slurm/slurm.conf
              subPath: slurm.conf
            - name: slurm-conf
              mountPath: /etc/slurm/gres.conf
              subPath: gres.conf
            - name: munge-key
              mountPath: /etc/munge/munge.key
              subPath: munge.key
            - name: state
              mountPath: /var/spool/slurmctld
      volumes:
        - name: slurm-config
          configMap:
            name: slurm-config
            defaultMode: 0755
        - name: slurm-conf
          configMap:
            name: slurm-config
        - name: munge-key
          secret:
            secretName: slurm-munge-key
            defaultMode: 0400
        - name: state
          emptyDir: {}
---
