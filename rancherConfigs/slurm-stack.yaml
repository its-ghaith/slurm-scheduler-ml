apiVersion: apps/v1
kind: Deployment
metadata:
  name: slurmd
  namespace: mlops-energy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: slurmd
  template:
    metadata:
      labels:
        app: slurmd
    spec:
      hostname: slurmd
      nodeSelector:
        kubernetes.io/hostname: malea-srv01
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: slurmd
          image: ghcr.io/its-ghaith/slurm-scheduler-ml/mlops-slurm-runtime:latest
          imagePullPolicy: Always
          securityContext:
            privileged: true
          env:
            - name: NVIDIA_VISIBLE_DEVICES
              value: all
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: compute,utility
          command: ["/bin/bash", "-lc"]
          args:
            - /bin/bash /opt/slurm/entrypoint.sh worker
          resources:
            limits:
              nvidia.com/gpu: 1
            requests:
              nvidia.com/gpu: 1
          ports:
            - containerPort: 6818
          volumeMounts:
            - name: slurm-config
              mountPath: /opt/slurm
            - name: slurm-conf
              mountPath: /etc/slurm/slurm.conf
              subPath: slurm.conf
            - name: slurm-conf
              mountPath: /etc/slurm/gres.conf
              subPath: gres.conf
            - name: munge-key
              mountPath: /etc/munge/munge.key
              subPath: munge.key
            - name: state
              mountPath: /var/spool/slurmd
            - name: logs
              mountPath: /workspace/logs
            - name: energy-metrics
              mountPath: /workspace/energy_metrics
        - name: node-exporter
          image: prom/node-exporter:latest
          imagePullPolicy: IfNotPresent
          args:
            - --collector.disable-defaults
            - --collector.textfile
            - --collector.textfile.directory=/workspace/energy_metrics/node_exporter
          ports:
            - containerPort: 9100
          volumeMounts:
            - name: energy-metrics
              mountPath: /workspace/energy_metrics
              readOnly: true
      volumes:
        - name: slurm-config
          configMap:
            name: slurm-config
            defaultMode: 0755
        - name: slurm-conf
          configMap:
            name: slurm-config
        - name: munge-key
          secret:
            secretName: slurm-munge-key
            defaultMode: 0400
        - name: state
          emptyDir: {}
        - name: logs
          emptyDir: {}
        - name: energy-metrics
          emptyDir: {}
---
